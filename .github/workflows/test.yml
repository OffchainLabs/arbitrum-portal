name: Test

on:
  pull_request:
    branches: ['master']
    types:
      - opened
      - reopened
      - synchronize
      # we skip ci for draft PRs
      # https://github.com/reviewdog/action-eslint/issues/29#issuecomment-985939887
      - ready_for_review
  workflow_dispatch:
  merge_group:

# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-files:
    name: Check files
    runs-on: ubuntu-4
    outputs:
      run_tests: ${{ steps.check-files.outputs.run_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/check-files
        id: check-files

  build:
    name: 'Build'
    needs: [check-files]
    uses: ./.github/workflows/build.yml
    secrets: inherit

  test-ui:
    name: 'Test UI Unit'
    runs-on: ubuntu-4
    needs: [build, check-files]
    if: needs.check-files.outputs.run_tests == 'true' && github.event.pull_request.draft == false
    env: &app_env
      NEXT_PUBLIC_RPC_PROVIDER: alchemy
      NEXT_PUBLIC_INFURA_KEY: ${{ secrets.NEXT_PUBLIC_INFURA_KEY }}
      NEXT_PUBLIC_ALCHEMY_KEY: ${{ secrets.NEXT_PUBLIC_ALCHEMY_KEY }}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
      NEXT_PUBLIC_FEATURE_FLAG_LIFI: ${{ secrets.NEXT_PUBLIC_FEATURE_FLAG_LIFI }}
      THE_GRAPH_NETWORK_API_KEY: ${{ secrets.THE_GRAPH_NETWORK_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install node_modules
        uses: OffchainLabs/actions/node-modules/install@main
        with:
          install-command: pnpm install --frozen-lockfile
          cache-key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Restore build artifacts
        uses: ./.github/actions/restore-build-artifacts

      - name: Start UI and run unit tests
        run: pnpm start-server-and-test 'start' http://127.0.0.1:3000 'pnpm test:unit'

  test-ui-integration:
    name: 'Test UI Integration'
    runs-on: ubuntu-4
    needs: [build, check-files]
    if: needs.check-files.outputs.run_tests == 'true' && github.event.pull_request.draft == false
    env: *app_env
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install node_modules
        uses: OffchainLabs/actions/node-modules/install@main
        with:
          install-command: pnpm install --frozen-lockfile
          cache-key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Restore build artifacts
        uses: ./.github/actions/restore-build-artifacts

      - name: Start UI and run integration tests
        run: pnpm start-server-and-test 'start' http://127.0.0.1:3000 'pnpm test:integration'

  audit:
    name: 'Audit'
    runs-on: ubuntu-4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      # npm retired the legacy audit endpoints (HTTP 410), which breaks
      # `pnpm audit` on pnpm 10. The fix shipped in pnpm 11 (pnpm/pnpm#11268),
      # so run the audit under pnpm 11 while the repo stays pinned to pnpm 10
      # everywhere else. Aligning `packageManager` for this job keeps pnpm from
      # switching back to 10 for the `pnpm audit` subprocess that audit-ci runs.
      - name: Use pnpm 11 for audit
        run: npm pkg set packageManager=pnpm@11.13.0

      - name: Install pnpm 11
        uses: pnpm/action-setup@v5
        with:
          version: 11.13.0
          run_install: false

      # No project install: `pnpm audit` reads pnpm-lock.yaml directly, and a
      # full pnpm 11 install would fail here on this repo's trustPolicy /
      # overrides settings. audit-ci is fetched on demand via npx.
      - name: Run audit
        run: npx --yes audit-ci@6.3.0 --config ./audit-ci.jsonc

  check-formatting:
    name: 'Check Formatting'
    needs: [build, check-files]
    runs-on: ubuntu-4
    env: *app_env
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install node_modules
        uses: OffchainLabs/actions/node-modules/install@main
        with:
          install-command: pnpm install --frozen-lockfile
          cache-key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Restore build artifacts
        uses: ./.github/actions/restore-build-artifacts

      - name: Check formatting with Prettier
        run: pnpm prettier:check

      - name: Check formatting with ESLint
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: pnpm lint

  e2e-tests:
    name: 'E2E Tests'
    needs: [build, check-files]
    if: needs.check-files.outputs.run_tests == 'true' && github.event.pull_request.draft == false
    uses: ./.github/workflows/e2e-tests.yml
    with:
      test_type: 'regular'
    secrets: inherit

  test-e2e-success:
    name: 'Test E2E Success'
    runs-on: ubuntu-4
    needs: [e2e-tests]
    if: always()
    steps:
      - name: Regular E2E Succeeded
        if: needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped'
        run: echo "Regular E2E tests passed"

      - name: Regular E2E Failed
        if: needs.e2e-tests.result != 'success' && needs.e2e-tests.result != 'skipped'
        run: exit 1
