name: E2E tests

on:
  workflow_call:
    inputs:
      test_type:
        required: true
        type: string

env:
  NEXT_PUBLIC_RPC_PROVIDER: alchemy
  NEXT_PUBLIC_INFURA_KEY: ${{ secrets.NEXT_PUBLIC_INFURA_KEY }}
  NEXT_PUBLIC_ALCHEMY_KEY: ${{ secrets.NEXT_PUBLIC_ALCHEMY_KEY }}
  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
  THE_GRAPH_NETWORK_API_KEY: ${{ secrets.THE_GRAPH_NETWORK_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  load-e2e-files:
    name: 'Load e2e files'
    if: inputs.test_type != 'cctp'
    runs-on: ubuntu-8
    outputs:
      matrix: ${{ steps.set-matrix.outputs.e2eFiles }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: set-matrix
        run: echo "e2eFiles=$(node .github/workflows/formatSpecfiles.js ${{ inputs.test_type }} | jq . --compact-output)" >> $GITHUB_OUTPUT

  build:
    name: 'Build'
    uses: ./.github/workflows/build.yml
    secrets: inherit

  test-e2e:
    name: 'Test E2E - ${{ matrix.test.typeName }}'
    needs: [build, load-e2e-files]
    runs-on: ubuntu-8
    # Healthy variant jobs finish in ~35m. A testnode that boots with a stalled
    # validator makes every withdrawal spec burn its full timeout (~90m job);
    # cap it so sick chains fail fast and can be rerun.
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.load-e2e-files.outputs.matrix) }}

    # The testnode runs as a service container; its ports are published to the
    # host runner so the (non-container) job and the app reach it on localhost.
    # The job stays on the host runner so the build-artifacts cache (saved by the
    # build job, also on the host) restores reliably.
    services:
      testnode:
        image: ghcr.io/offchainlabs/arbitrum-testnode-ci:v0.2.2-nc3.2-${{ matrix.test.tag }}
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          TESTNODE_VARIANT: ${{ matrix.test.tag }}
        ports:
          - 8080:8080
          - 8545:8545
          - 8547:8547
          - 3347:8549

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install node_modules
        uses: OffchainLabs/actions/node-modules/install@main
        with:
          install-command: pnpm install --frozen-lockfile
          cache-key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Restore build artifacts
        uses: ./.github/actions/restore-build-artifacts

      - name: Install cypress
        run: pnpm cypress install

      - name: Install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
          fluxbox \
          xvfb

      - name: Run xvfb and fluxbox
        run: |
          Xvfb :0 -screen 0 1366x768x24 -listen tcp -ac &
          fluxbox &
        env:
          DISPLAY: :0.0

      # The runner only starts job steps once the testnode service container
      # reports healthy (its HEALTHCHECK polls all chain RPCs), so the config
      # is ready to fetch here.
      - name: Fetch testnode config
        run: curl -sf http://localhost:8080/config/localNetwork.json -o packages/arb-token-bridge-ui/src/util/networksNitroTestnode.generated.json

      - name: Run e2e tests via cypress-io/github-action
        uses: cypress-io/github-action@0da3c06ed8217b912deea9d8ee69630baed1737e # pin@v6.7.6
        with:
          start: pnpm start
          command: >-
            ${{
              (matrix.test.type == 'orbit-eth') && 'pnpm test:e2e:orbit' ||
              (matrix.test.type == 'orbit-custom-6dec' && 'pnpm test:e2e:orbit:custom-gas-token') ||
              (matrix.test.type == 'orbit-custom-18dec' && 'pnpm test:e2e:orbit:custom-gas-token') ||
              (matrix.test.type == 'orbit-custom-20dec' && 'pnpm test:e2e:orbit:custom-gas-token') ||
              'pnpm test:e2e'
            }}
          wait-on: http://127.0.0.1:3000
          wait-on-timeout: 120
        env:
          DISPLAY: :0.0
          SKIP_METAMASK_SETUP: true
          CYPRESS_RECORD_VIDEO: ${{ matrix.test.recordVideo }}
          PRIVATE_KEY_CUSTOM: ${{ secrets.E2E_PRIVATE_KEY }}
          PRIVATE_KEY_USER: ${{ secrets.E2E_PRIVATE_KEY_USER }}
          PRIVATE_KEY_CCTP: ${{ secrets.E2E_PRIVATE_KEY_CCTP }}
          NEXT_PUBLIC_IS_E2E_TEST: true
          NEXT_PUBLIC_RPC_PROVIDER: alchemy
          NEXT_PUBLIC_INFURA_KEY: ${{ secrets.NEXT_PUBLIC_INFURA_KEY }}
          NEXT_PUBLIC_ALCHEMY_KEY: ${{ secrets.NEXT_PUBLIC_ALCHEMY_KEY }}
          NEXT_PUBLIC_RPC_URL_NITRO_TESTNODE_L1: http://127.0.0.1:8545
          NEXT_PUBLIC_RPC_URL_NITRO_TESTNODE_L2: http://127.0.0.1:8547
          NEXT_PUBLIC_RPC_URL_NITRO_TESTNODE_L3: http://127.0.0.1:3347

      - name: Archive e2e artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts-${{ github.sha }}-${{ matrix.test.type }}
          path: |
            ./packages/arb-token-bridge-ui/cypress/videos
            ./packages/arb-token-bridge-ui/cypress/screenshots
          if-no-files-found: 'ignore'
        continue-on-error: true

  test-e2e-cctp:
    name: 'Test E2E - CCTP'
    needs: [build]
    runs-on: ubuntu-8
    if: inputs.test_type == 'cctp'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install node_modules
        uses: OffchainLabs/actions/node-modules/install@main
        with:
          install-command: pnpm install --frozen-lockfile
          cache-key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Restore build artifacts
        uses: ./.github/actions/restore-build-artifacts

      - name: Install cypress
        run: pnpm cypress install

      - name: Install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
          fluxbox \
          xvfb

      - name: Run xvfb and fluxbox
        run: |
          Xvfb :0 -screen 0 1366x768x24 -listen tcp -ac &
          fluxbox &
        env:
          DISPLAY: :0.0

      - name: Run CCTP e2e tests via cypress-io/github-action
        uses: cypress-io/github-action@0da3c06ed8217b912deea9d8ee69630baed1737e # pin@v6.7.6
        with:
          start: pnpm start
          command: pnpm test:e2e:cctp
          wait-on: http://127.0.0.1:3000
          wait-on-timeout: 120
        env:
          DISPLAY: :0.0
          SKIP_METAMASK_SETUP: true
          CYPRESS_RECORD_VIDEO: false
          PRIVATE_KEY_CUSTOM: ${{ secrets.E2E_PRIVATE_KEY }}
          PRIVATE_KEY_USER: ${{ secrets.E2E_PRIVATE_KEY_USER }}
          PRIVATE_KEY_CCTP: ${{ secrets.E2E_PRIVATE_KEY_CCTP }}
          NEXT_PUBLIC_IS_E2E_TEST: true
          NEXT_PUBLIC_RPC_PROVIDER: alchemy
          NEXT_PUBLIC_INFURA_KEY: ${{ secrets.NEXT_PUBLIC_INFURA_KEY }}
          NEXT_PUBLIC_ALCHEMY_KEY: ${{ secrets.NEXT_PUBLIC_ALCHEMY_KEY }}

      - name: Archive e2e artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts-${{ github.sha }}-cctp
          path: |
            ./packages/arb-token-bridge-ui/cypress/videos
            ./packages/arb-token-bridge-ui/cypress/screenshots
          if-no-files-found: 'ignore'
        continue-on-error: true

  clean-up:
    name: 'Clean Up'
    runs-on: ubuntu-8
    needs: [test-e2e, test-e2e-cctp]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install gh-actions-cache
        run: gh extension install actions/gh-actions-cache
      # Keep the cache when anything failed: re-runs reuse the run_id and the
      # succeeded build job does not re-run, so a rerun's restore would miss.
      - name: Delete build artifacts
        if: needs.test-e2e.result != 'failure' && needs.test-e2e-cctp.result != 'failure'
        run: |
          if gh actions-cache list | grep build-artifacts-${{ github.run_id }}
          then
            gh actions-cache delete build-artifacts-${{ github.run_id }} --confirm
          fi
        shell: bash
