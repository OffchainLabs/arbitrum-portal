name: E2E tests

on:
  workflow_call:
    inputs:
      test_type:
        required: true
        type: string

env:
  NEXT_PUBLIC_RPC_PROVIDER: alchemy
  NEXT_PUBLIC_INFURA_KEY: ${{ secrets.NEXT_PUBLIC_INFURA_KEY }}
  NEXT_PUBLIC_ALCHEMY_KEY: ${{ secrets.NEXT_PUBLIC_ALCHEMY_KEY }}
  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
  THE_GRAPH_NETWORK_API_KEY: ${{ secrets.THE_GRAPH_NETWORK_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  load-e2e-files:
    name: 'Load e2e files'
    if: inputs.test_type != 'cctp'
    runs-on: ubuntu-8
    outputs:
      matrix: ${{ steps.set-matrix.outputs.e2eFiles }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: set-matrix
        run: echo "e2eFiles=$(node .github/workflows/formatSpecfiles.js ${{ inputs.test_type }} | jq . --compact-output)" >> $GITHUB_OUTPUT

  build:
    name: 'Build'
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      artifact_name: build-artifacts-e2e

  test-e2e:
    name: 'Test E2E - ${{ matrix.test.name }} ${{ matrix.test.typeName }}'
    needs: [build, load-e2e-files]
    runs-on: ubuntu-8
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.load-e2e-files.outputs.matrix) }}

    # The testnode runs as a service container; its ports are published to the
    # host runner so the (non-container) job and the app reach it on localhost.
    # The job stays on the host runner so the build-artifacts cache (saved by the
    # build job, also on the host) restores reliably.
    services:
      testnode:
        image: ghcr.io/offchainlabs/arbitrum-testnode-ci:v0.2.2-nc3.2-${{ matrix.test.tag }}
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          TESTNODE_VARIANT: ${{ matrix.test.tag }}
        ports:
          - 8080:8080
          - 8545:8545
          - 8547:8547
          - 3347:8549

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install node_modules
        uses: OffchainLabs/actions/node-modules/install@main
        with:
          install-command: pnpm install --frozen-lockfile
          cache-key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Restore build artifacts
        uses: ./.github/actions/restore-build-artifacts
        with:
          name: build-artifacts-e2e

      - name: Install Playwright chromium
        run: pnpm --filter arb-token-bridge-ui exec playwright install --with-deps chromium

      - name: Install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
          fluxbox \
          xvfb

      - name: Run xvfb and fluxbox
        run: |
          Xvfb :0 -screen 0 1366x768x24 -listen tcp -ac &
          fluxbox &
        env:
          DISPLAY: :0.0

      - name: Wait for testnode healthy
        run: |
          node -e "
            const http = require('http');
            function check(url) {
              return new Promise((resolve, reject) => {
                http.get(url, res => {
                  let d = '';
                  res.on('data', c => d += c);
                  res.on('end', () => res.statusCode === 200 ? resolve(d) : reject(d));
                }).on('error', reject);
              });
            }
            function rpcCheck(host, port) {
              return new Promise((resolve, reject) => {
                const body = JSON.stringify({jsonrpc:'2.0',method:'eth_chainId',params:[],id:1});
                const req = http.request({hostname:host,port,method:'POST',headers:{'Content-Type':'application/json'}}, res => {
                  let d = '';
                  res.on('data', c => d += c);
                  res.on('end', () => { try { const r = JSON.parse(d); r.result ? resolve(r.result) : reject(d); } catch { reject(d); } });
                });
                req.on('error', reject);
                req.setTimeout(3000, () => { req.destroy(); reject('timeout'); });
                req.write(body);
                req.end();
              });
            }
            async function waitFor(fn, label) {
              const start = Date.now();
              while (Date.now() - start < 180000) {
                try { const r = await fn(); console.log(label, 'ready:', typeof r === 'string' ? r.substring(0, 50) : r); return; }
                catch { console.log('Waiting for', label, '...'); await new Promise(r => setTimeout(r, 3000)); }
              }
              throw new Error(label + ' not ready after 180s');
            }
            (async () => {
              await waitFor(() => check('http://localhost:8080/health'), 'health');
              await waitFor(() => rpcCheck('localhost', 8545), 'L1 RPC');
              await waitFor(() => rpcCheck('localhost', 8547), 'L2 RPC');
              if ('${{ matrix.test.type }}' !== 'regular') {
                await waitFor(() => rpcCheck('localhost', 3347), 'L3 RPC');
              }
            })().catch(e => { console.error(e); process.exit(1); });
          "
        timeout-minutes: 4

      - name: Fetch testnode config
        run: |
          node -e "
            const http = require('http');
            const fs = require('fs');
            const path = 'packages/arb-token-bridge-ui/src/util/networksNitroTestnode.generated.json';
            http.get('http://localhost:8080/config/localNetwork.json', res => {
              let d = '';
              res.on('data', c => d += c);
              res.on('end', () => {
                fs.writeFileSync(path, d);
                const config = JSON.parse(d);
                console.log('Fetched testnode config:');
                console.log('  L2 rollup:', config.l2Network?.ethBridge?.rollup);
                console.log('  L3 rollup:', config.l3Network?.ethBridge?.rollup);
                console.log('  L2 chainId:', config.l2Network?.chainId);
              });
            }).on('error', e => { console.error('Failed to fetch testnode config:', e.message); process.exit(1); });
          "

      - name: Run e2e tests (Playwright)
        run: |
          pnpm start &
          npx --yes wait-on http://127.0.0.1:3000 --timeout 120000
          ${{
            (matrix.test.type == 'cctp') && 'pnpm test:e2e:cctp' ||
            format('pnpm test:e2e {0}', matrix.test.file)
          }}
        env:
          DISPLAY: :0.0
          E2E_ORBIT: ${{ matrix.test.type == 'orbit-eth' }}
          E2E_ORBIT_CUSTOM_GAS_TOKEN: ${{ startsWith(matrix.test.type, 'orbit-custom') }}
          ORBIT_CUSTOM_GAS_TOKEN: ${{ startsWith(matrix.test.type, 'orbit-custom') }}
          METAMASK_VERSION: 11.15.0
          SKIP_METAMASK_SETUP: true
          CYPRESS_RECORD_VIDEO: ${{ matrix.test.recordVideo }}
          PRIVATE_KEY_CUSTOM: ${{ secrets.E2E_PRIVATE_KEY }}
          PRIVATE_KEY_USER: ${{ secrets.E2E_PRIVATE_KEY_USER }}
          PRIVATE_KEY_CCTP: ${{ secrets.E2E_PRIVATE_KEY_CCTP }}
          NEXT_PUBLIC_IS_E2E_TEST: true
          NEXT_PUBLIC_RPC_PROVIDER: alchemy
          NEXT_PUBLIC_INFURA_KEY: ${{ secrets.NEXT_PUBLIC_INFURA_KEY }}
          NEXT_PUBLIC_ALCHEMY_KEY: ${{ secrets.NEXT_PUBLIC_ALCHEMY_KEY }}
          NEXT_PUBLIC_RPC_URL_NITRO_TESTNODE_L1: http://127.0.0.1:8545
          NEXT_PUBLIC_RPC_URL_NITRO_TESTNODE_L2: http://127.0.0.1:8547
          NEXT_PUBLIC_RPC_URL_NITRO_TESTNODE_L3: http://127.0.0.1:3347

      - name: Archive e2e artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts-${{ github.sha }}-${{ matrix.test.name }}-${{ matrix.test.type }}
          path: |
            ./packages/arb-token-bridge-ui/test-results
            ./packages/arb-token-bridge-ui/playwright-report
          if-no-files-found: 'ignore'
        continue-on-error: true

  test-e2e-cctp:
    name: 'Test E2E - CCTP'
    needs: [build]
    runs-on: ubuntu-8
    if: inputs.test_type == 'cctp'

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install node_modules
        uses: OffchainLabs/actions/node-modules/install@main
        with:
          install-command: pnpm install --frozen-lockfile
          cache-key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Restore build artifacts
        uses: ./.github/actions/restore-build-artifacts
        with:
          name: build-artifacts-e2e

      - name: Install cypress
        run: pnpm cypress install

      - name: Install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
          fluxbox \
          xvfb

      - name: Run xvfb and fluxbox
        run: |
          Xvfb :0 -screen 0 1366x768x24 -listen tcp -ac &
          fluxbox &
        env:
          DISPLAY: :0.0

      - name: Run CCTP e2e tests via cypress-io/github-action
        uses: cypress-io/github-action@0da3c06ed8217b912deea9d8ee69630baed1737e # pin@v6.7.6
        with:
          start: pnpm start
          command: pnpm test:e2e:cctp
          wait-on: http://127.0.0.1:3000
          wait-on-timeout: 120
        env:
          DISPLAY: :0.0
          SKIP_METAMASK_SETUP: true
          CYPRESS_RECORD_VIDEO: false
          PRIVATE_KEY_CUSTOM: ${{ secrets.E2E_PRIVATE_KEY }}
          PRIVATE_KEY_USER: ${{ secrets.E2E_PRIVATE_KEY_USER }}
          PRIVATE_KEY_CCTP: ${{ secrets.E2E_PRIVATE_KEY_CCTP }}
          NEXT_PUBLIC_IS_E2E_TEST: true
          NEXT_PUBLIC_RPC_PROVIDER: alchemy
          NEXT_PUBLIC_INFURA_KEY: ${{ secrets.NEXT_PUBLIC_INFURA_KEY }}
          NEXT_PUBLIC_ALCHEMY_KEY: ${{ secrets.NEXT_PUBLIC_ALCHEMY_KEY }}

      - name: Archive e2e artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts-${{ github.sha }}-cctp
          path: |
            ./packages/arb-token-bridge-ui/cypress/videos
            ./packages/arb-token-bridge-ui/cypress/screenshots
          if-no-files-found: 'ignore'
        continue-on-error: true

  clean-up:
    name: 'Clean Up'
    runs-on: ubuntu-8
    needs: [test-e2e, test-e2e-cctp]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install gh-actions-cache
        run: gh extension install actions/gh-actions-cache
      - name: Delete build artifacts
        run: |
          if gh actions-cache list | grep build-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          then
            gh actions-cache delete build-artifacts-${{ github.run_id }}-${{ github.run_attempt }} --confirm
          fi
        shell: bash
