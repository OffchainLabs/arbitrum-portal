autoInstallPeers: true
shamefullyHoist: true
dedupePeerDependents: true
resolvePeersFromWorkspaceRoot: true

# Supply chain security settings
# See: https://pnpm.io/supply-chain-security

# Only allow build scripts for explicitly trusted packages.
allowBuilds:
  '@reown/appkit': true
  bufferutil: true
  core-js: true
  core-js-pure: true
  cypress: true
  esbuild: true
  keccak: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: true

# Block transitive dependencies from using exotic sources (git repos, tarball URLs).
# Only direct dependencies may use non-registry sources.
blockExoticSubdeps: true

# Delay installing newly published packages by 24 hours (1440 minutes).
# Gives time for malware to be detected before installation.
minimumReleaseAge: 1440

# Prevent installing package versions with decreased trust levels
# compared to previously published versions.
trustPolicy: no-downgrade
# Exact-version exemptions for pinned versions published before their package
# adopted npm attestation — they read as "downgrades" vs newer attested releases
# but are legitimate. Being exact pins, they don't exempt any future version.
# When a package below is upgraded past its pinned version, delete its entry.
trustPolicyExclude:
  - '@coinbase/cdp-sdk@1.38.4'
  - '@noble/curves@1.8.0'
  - '@noble/hashes@1.7.0'
  - '@octokit/endpoint@9.0.6'
  - '@octokit/plugin-paginate-rest@9.2.2'
  - '@reduxjs/toolkit@2.9.2'
  - 'eslint-import-resolver-typescript@3.10.1'
  - 'react-redux@9.2.0'
  - 'reselect@5.1.1'
  - 'semver@5.7.2'
  - 'semver@6.3.1'
  - 'slow-redact@0.3.2'
  - 'undici-types@6.21.0'
